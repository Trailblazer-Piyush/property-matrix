<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Availability Matrix</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:               #0d0f14;
    --surface:          #13161e;
    --surface2:         #1a1e28;
    --border:           #232838;
    --border-light:     #2e3448;

    /* Gold accent */
    --gold:             #c8a96e;
    --gold-dim:         rgba(200,169,110,0.12);
    --gold-border:      rgba(200,169,110,0.25);

    /* Available — deep emerald */
    --avail:            #00c864;
    --avail-dark:       #007a3d;
    --avail-bg:         #0a2318;
    --avail-bg2:        #0d2e1f;
    --avail-border:     rgba(0,200,100,0.35);
    --avail-glow:       rgba(0,200,100,0.15);
    --avail-text:       #d4fce9;
    --avail-subtext:    rgba(212,252,233,0.6);

    /* Sold — deep crimson */
    --sold:             #ff3d57;
    --sold-dark:        #9b1a2a;
    --sold-bg:          #230a10;
    --sold-bg2:         #2e0d14;
    --sold-border:      rgba(255,61,87,0.35);
    --sold-glow:        rgba(255,61,87,0.15);
    --sold-text:        #ffd4da;
    --sold-subtext:     rgba(255,212,218,0.6);

    --text:             #e4e8f0;
    --text-muted:       #6b738f;
    --text-dim:         #363d55;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Rajdhani',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }

  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(200,169,110,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,.025) 1px, transparent 1px);
    background-size:48px 48px;
  }

  .wrapper { position:relative; z-index:1; }

  /* ═══ HEADER ═══════════════════════════════════════════════════════ */
  header {
    padding:32px 48px 26px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(160deg, rgba(200,169,110,.05) 0%, transparent 60%);
    position:relative;
  }
  header::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:.3;
  }

  .brand-line { display:flex; align-items:center; gap:16px; }
  .brand-icon {
    width:46px; height:46px; border:2px solid var(--gold); position:relative;
    display:flex; align-items:center; justify-content:center;
    color:var(--gold); font-family:'Space Mono',monospace; font-size:18px;
    background:var(--gold-dim);
  }
  .brand-icon::before { content:''; position:absolute; inset:4px; border:1px solid rgba(200,169,110,.18); }

  h1 { font-size:26px; font-weight:700; letter-spacing:5px; text-transform:uppercase; line-height:1.1; }
  h1 span { color:var(--gold); }
  .subtitle { font-size:10px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; font-family:'Space Mono',monospace; margin-top:3px; }

  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:14px; }

  /* Sync */
  .sync-bar { display:flex; align-items:center; gap:10px; font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); }
  .sync-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    background:var(--avail); box-shadow:0 0 8px var(--avail);
    transition:background .4s, box-shadow .4s;
  }
  .sync-dot.stale   { background:var(--gold);  box-shadow:0 0 8px var(--gold); }
  .sync-dot.error   { background:var(--sold);  box-shadow:0 0 8px var(--sold); }
  .sync-dot.loading { background:var(--text-muted); box-shadow:none; animation:blink 1.1s ease infinite; }
  @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

  /* Countdown ring */
  .refresh-wrap { display:flex; align-items:center; gap:8px; }
  .countdown-ring { position:relative; width:28px; height:28px; flex-shrink:0; }
  .countdown-ring svg { transform:rotate(-90deg); }
  .ring-bg   { fill:none; stroke:var(--border); stroke-width:2.5; }
  .ring-fill { fill:none; stroke:var(--gold); stroke-width:2.5; stroke-linecap:round;
               stroke-dasharray:69.1; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear; }

  .refresh-btn {
    display:flex; align-items:center; gap:7px; padding:7px 16px;
    border:1px solid var(--border); background:transparent;
    color:var(--text-muted); font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:1px; cursor:pointer; transition:all .2s; text-transform:uppercase;
  }
  .refresh-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); }
  .refresh-btn:disabled { opacity:.4; cursor:not-allowed; }
  .refresh-icon { font-size:14px; display:inline-block; }
  .refresh-btn.spinning .refresh-icon { animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Stats */
  .header-stats { display:flex; gap:28px; }
  .stat-item { text-align:right; }
  .stat-value { font-size:30px; font-weight:700; line-height:1; font-family:'Space Mono',monospace; }
  .stat-value.c-gold  { color:var(--gold); }
  .stat-value.c-avail { color:var(--avail); }
  .stat-value.c-sold  { color:var(--sold); }
  .stat-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; }

  /* ═══ CONTROLS ══════════════════════════════════════════════════════ */
  .controls-bar {
    padding:20px 48px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:24px; flex-wrap:wrap;
  }
  .control-group { display:flex; flex-direction:column; gap:6px; }
  .control-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); font-family:'Space Mono',monospace; }
  .filter-row { display:flex; gap:7px; flex-wrap:wrap; }

  .filter-btn {
    padding:7px 16px; border:1px solid var(--border); background:transparent;
    color:var(--text-muted); font-family:'Rajdhani',sans-serif; font-size:14px;
    font-weight:600; letter-spacing:1px; cursor:pointer; transition:all .2s; text-transform:uppercase;
  }
  .filter-btn:hover            { border-color:var(--gold); color:var(--gold); }
  .filter-btn.active-all       { background:var(--gold-dim); border-color:var(--gold-border); color:var(--gold); }
  .filter-btn.active-available { background:rgba(0,200,100,.1); border-color:var(--avail-border); color:var(--avail); }
  .filter-btn.active-sold      { background:rgba(255,61,87,.1); border-color:var(--sold-border); color:var(--sold); }

  .divider-v { width:1px; height:38px; background:var(--border); flex-shrink:0; }

  .floor-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .floor-pill {
    padding:6px 13px; border:1px solid var(--border); background:transparent;
    color:var(--text-muted); font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; transition:all .2s;
  }
  .floor-pill:hover  { border-color:var(--gold); color:var(--gold); }
  .floor-pill.active { background:var(--gold-dim); border-color:var(--gold-border); color:var(--gold); }

  /* ═══ MAIN ══════════════════════════════════════════════════════════ */
  .main { padding:28px 48px 64px; }

  .results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .results-count { font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); letter-spacing:1px; }
  .results-count span { color:var(--gold); font-weight:700; }

  .right-controls { display:flex; align-items:center; gap:8px; }
  .view-toggle { display:flex; gap:4px; }
  .view-btn { padding:6px 12px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; font-size:14px; transition:all .2s; }
  .view-btn.active { background:var(--surface2); border-color:var(--gold); color:var(--gold); }

  /* Legend */
  .legend { display:flex; gap:20px; margin-bottom:22px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; }
  .legend-swatch {
    width:28px; height:12px; border-radius:2px;
  }
  .legend-swatch.avail { background:linear-gradient(90deg, var(--avail-bg), var(--avail)); border:1px solid var(--avail-border); }
  .legend-swatch.sold  { background:linear-gradient(90deg, var(--sold-bg),  var(--sold));  border:1px solid var(--sold-border); }
  .legend-item.avail { color:var(--avail); }
  .legend-item.sold  { color:var(--sold); }

  /* ═══ SKELETON ══════════════════════════════════════════════════════ */
  .skeleton-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .skeleton-card { background:var(--surface); border:1px solid var(--border); height:160px; overflow:hidden; border-radius:2px; }
  .skel-top { height:50%; background:var(--surface2); }
  .skel-body { padding:14px; display:flex; flex-direction:column; gap:10px; }
  .skel { background:var(--border); border-radius:2px; animation:shimmer 1.6s infinite; }
  .skel-a { height:13px; width:55%; }
  .skel-b { height:11px; width:38%; }
  @keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.8} }

  /* ═══ GRID CARDS ════════════════════════════════════════════════════ */
  #gridView { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }

  @keyframes cardIn { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

  .unit-card {
    border:1px solid transparent; border-radius:3px; overflow:hidden;
    cursor:default; animation:cardIn .32s cubic-bezier(.22,.68,0,1.2) both;
    transition:transform .22s, box-shadow .22s;
    position:relative;
  }
  .unit-card:hover { transform:translateY(-4px); }

  /* ── Available card ── */
  .unit-card.available {
    background: linear-gradient(145deg, var(--avail-bg) 0%, var(--avail-bg2) 100%);
    border-color: var(--avail-border);
    box-shadow: 0 0 0 0 var(--avail-glow);
  }
  .unit-card.available:hover {
    box-shadow: 0 16px 48px rgba(0,0,0,.55), 0 0 24px var(--avail-glow);
  }

  /* ── Sold card ── */
  .unit-card.sold {
    background: linear-gradient(145deg, var(--sold-bg) 0%, var(--sold-bg2) 100%);
    border-color: var(--sold-border);
    box-shadow: 0 0 0 0 var(--sold-glow);
  }
  .unit-card.sold:hover {
    box-shadow: 0 16px 48px rgba(0,0,0,.55), 0 0 24px var(--sold-glow);
  }

  /* Diagonal pattern overlay */
  .unit-card::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(
      135deg,
      rgba(255,255,255,.012) 0px,
      rgba(255,255,255,.012) 1px,
      transparent 1px,
      transparent 12px
    );
  }

  /* Top accent strip */
  .card-strip {
    height:3px; width:100%; position:relative; z-index:1;
  }
  .available .card-strip { background:linear-gradient(90deg, var(--avail), rgba(0,200,100,.1)); }
  .sold      .card-strip { background:linear-gradient(90deg, var(--sold),  rgba(255,61,87,.1)); }

  .card-body { padding:18px; position:relative; z-index:1; }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }

  .unit-id {
    font-family:'Space Mono',monospace; font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
  }
  .available .unit-id { color:var(--avail-text); }
  .sold      .unit-id { color:var(--sold-text); }

  .status-badge {
    font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    padding:4px 9px; font-family:'Space Mono',monospace; border-radius:2px;
  }
  .available .status-badge {
    background:rgba(0,200,100,.18); color:var(--avail); border:1px solid var(--avail-border);
  }
  .sold .status-badge {
    background:rgba(255,61,87,.18); color:var(--sold); border:1px solid var(--sold-border);
  }

  .card-floor {
    font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px;
    display:flex; align-items:center; gap:6px;
  }
  .available .card-floor { color:var(--avail-subtext); }
  .sold      .card-floor { color:var(--sold-subtext); }

  /* Separator line */
  .card-sep { height:1px; margin-bottom:14px; }
  .available .card-sep { background:linear-gradient(90deg, var(--avail-border), transparent); }
  .sold      .card-sep { background:linear-gradient(90deg, var(--sold-border),  transparent); }

  .card-price-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:4px; font-family:'Space Mono',monospace; }
  .available .card-price-label { color:rgba(0,200,100,.5); }
  .sold      .card-price-label { color:rgba(255,61,87,.5); }

  .card-price { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
  .available .card-price { color:var(--avail); }
  .sold      .card-price { color:var(--sold); }

  /* ═══ TABLE ═════════════════════════════════════════════════════════ */
  #tableView { display:none; border:1px solid var(--border); overflow:hidden; }
  .data-table { width:100%; border-collapse:collapse; font-size:14px; }
  .data-table thead tr { border-bottom:1px solid var(--border); background:var(--surface2); }
  .data-table th {
    padding:14px 20px; text-align:left; font-size:10px; letter-spacing:3px;
    text-transform:uppercase; color:var(--gold); font-family:'Space Mono',monospace; font-weight:400;
  }
  @keyframes rowIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .data-table tbody tr { border-bottom:1px solid var(--border); transition:background .15s; animation:rowIn .25s ease both; }
  .data-table tbody tr.row-available { background:rgba(0,200,100,.04); }
  .data-table tbody tr.row-sold      { background:rgba(255,61,87,.04); }
  .data-table tbody tr:hover.row-available { background:rgba(0,200,100,.1); }
  .data-table tbody tr:hover.row-sold      { background:rgba(255,61,87,.1); }

  .data-table td { padding:14px 20px; }
  .table-unit  { font-family:'Space Mono',monospace; font-weight:700; font-size:14px; }
  .row-available .table-unit { color:var(--avail-text); }
  .row-sold      .table-unit { color:var(--sold-text); }
  .table-floor { color:var(--text-muted); font-size:13px; }
  .row-available .table-value { color:var(--avail); font-family:'Space Mono',monospace; font-weight:700; }
  .row-sold      .table-value { color:var(--sold);  font-family:'Space Mono',monospace; font-weight:700; }

  .table-badge {
    display:inline-flex; align-items:center; gap:6px; padding:4px 11px;
    font-size:10px; letter-spacing:2px; font-family:'Space Mono',monospace;
    font-weight:700; text-transform:uppercase; border-radius:2px;
  }
  .table-badge.available { background:rgba(0,200,100,.12); color:var(--avail); border:1px solid var(--avail-border); }
  .table-badge.sold      { background:rgba(255,61,87,.12);  color:var(--sold);  border:1px solid var(--sold-border); }
  .table-badge::before   { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }

  /* ═══ EMPTY ════════════════════════════════════════════════════════ */
  .empty-state { display:none; text-align:center; padding:80px 20px; color:var(--text-muted); }
  .empty-state .icon { font-size:44px; margin-bottom:14px; opacity:.2; }
  .empty-state p { letter-spacing:2px; text-transform:uppercase; font-size:12px; }

  /* ═══ TOAST ════════════════════════════════════════════════════════ */
  .toast {
    position:fixed; bottom:28px; right:28px; background:var(--surface2);
    border:1px solid var(--gold-border); padding:12px 22px;
    font-family:'Space Mono',monospace; font-size:12px; color:var(--gold);
    transform:translateY(80px); opacity:0; transition:all .28s ease; z-index:200; letter-spacing:.5px;
  }
  .toast.show  { transform:translateY(0); opacity:1; }
  .toast.error { border-color:var(--sold-border); color:var(--sold); }
  .toast.info  { border-color:var(--gold-border); color:var(--gold); }

  /* ═══ ERROR PANEL ══════════════════════════════════════════════════════ */
  .error-panel {
    display:none; margin:0 48px 24px;
    border:1px solid var(--sold-border); background:var(--sold-bg);
    padding:20px 28px; border-radius:3px;
  }
  .error-panel.show { display:block; }
  .error-title { color:var(--sold); font-size:15px; font-weight:700; letter-spacing:1px; margin-bottom:8px; }
  .error-body  { color:var(--sold-text); font-size:13px; line-height:1.7; }
  .error-body code { background:rgba(255,61,87,.15); padding:2px 6px; border-radius:2px; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); }
  ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

  @media(max-width:768px) {
    header { padding:20px 24px; flex-direction:column; align-items:flex-start; gap:18px; }
    .controls-bar { padding:16px 24px; }
    .main { padding:20px 24px 48px; }
    .header-stats { gap:18px; }
    #gridView { grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div>
      <div class="brand-line">
        <div class="brand-icon">▦</div>
        <div>
          <h1>Property <span>Matrix</span></h1>
          <div class="subtitle">Unit Availability Dashboard</div>
        </div>
      </div>
    </div>

    <div class="header-right">
      <div class="sync-bar">
        <div class="sync-dot loading" id="syncDot"></div>
        <span id="syncLabel">Connecting…</span>
        <div class="refresh-wrap">
          <!-- Countdown ring (shows 1-min progress) -->
          <div class="countdown-ring" id="countdownRing" title="Next auto-refresh">
            <svg width="28" height="28" viewBox="0 0 28 28">
              <circle class="ring-bg"   cx="14" cy="14" r="11"/>
              <circle class="ring-fill" cx="14" cy="14" r="11" id="ringFill"/>
            </svg>
          </div>
          <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">
            <span class="refresh-icon">↻</span> Refresh
          </button>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-item"><div class="stat-value c-gold"  id="statTotal">—</div><div class="stat-label">Total</div></div>
        <div class="stat-item"><div class="stat-value c-avail" id="statAvail">—</div><div class="stat-label">Available</div></div>
        <div class="stat-item"><div class="stat-value c-sold"  id="statSold">—</div><div class="stat-label">Sold</div></div>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="control-group">
      <div class="control-label">Status</div>
      <div class="filter-row">
        <button class="filter-btn active-all"  onclick="setStatus('all',this)">All</button>
        <button class="filter-btn"             onclick="setStatus('Available',this)">● Available</button>
        <button class="filter-btn"             onclick="setStatus('Sold',this)">● Sold</button>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="control-group">
      <div class="control-label">Floor</div>
      <div class="floor-pills" id="floorPills"></div>
    </div>
  </div>

  <!-- Error Panel -->
  <div class="error-panel" id="errorPanel">
    <div class="error-title" id="errorTitle"></div>
    <div class="error-body"  id="errorBody"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="results-bar">
      <div class="results-count">Showing <span id="countDisplay">0</span> units</div>
      <div class="right-controls">
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid',this)"  title="Grid">⊞</button>
          <button class="view-btn"        onclick="setView('table',this)" title="Table">☰</button>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item avail"><div class="legend-swatch avail"></div>Available</div>
      <div class="legend-item sold" ><div class="legend-swatch sold"></div>Sold</div>
    </div>

    <!-- Skeleton -->
    <div id="skeletonLoader" class="skeleton-grid">
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
      <div class="skeleton-card"><div class="skel-top"></div><div class="skel-body"><div class="skel skel-a"></div><div class="skel skel-b"></div></div></div>
    </div>

    <div id="gridView"  style="display:none"></div>

    <div id="tableView" style="display:none">
      <table class="data-table">
        <thead><tr><th>Unit</th><th>Floor</th><th>Status</th><th>Sale Value</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="icon">◫</div>
      <p>No units match selected filters</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   ⚙  CONFIGURATION  — only edit this block
   ═══════════════════════════════════════════════════════════════

   Excel file is hosted on GitHub in the same repository.
   GitHub Pages serves it directly — no CORS, no sign-in needed.

   ⚠  YOUR EXCEL FILE MUST:
      - Be named exactly:  Matrix.xlsx
      - Be in the ROOT of your GitHub repository (same folder as index.html)
      - Have columns named:  Floor | Unit | Status | Sale Value

   ⚠  IF YOU RENAME THE FILE:
      Update EXCEL_FILE below to match.

   ═══════════════════════════════════════════════════════════════ */

const CONFIG = {
  // ── ① Excel filename — must match exactly what is in your GitHub repo ────
  EXCEL_FILE: "Matrix.xlsx",

  // ── ② Excel sheet column headers — must match your Excel column names ────
  COLUMNS: { floor:"Floor", unit:"Unit", status:"Status", value:"Sale Value" },

  // ── ③ Auto-refresh every 1 minute ───────────────────────────────────────
  AUTO_REFRESH_MINUTES: 1
};

// Builds the full URL to the Excel file on GitHub Pages
// Works both on GitHub Pages (https://username.github.io/repo/) and locally
function buildExcelUrl() {
  const base = window.location.href.replace(/\/[^\/]*$/, '/');
  return base + CONFIG.EXCEL_FILE + '?nocache=' + Date.now();
}

/* ════════════════ State ════════════════ */
let allData       = [];
let activeStatus  = 'all';
let activeFloor   = 'all';
let currentView   = 'grid';
let lastFetchTime = null;
let refreshTimer  = null;
let countdownInt  = null;
const CIRCUMF     = 2 * Math.PI * 11;

/* ════════════════ Fetch ════════════════ */
async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('spinning');
  setSyncState('loading', 'Fetching…');
  showSkeleton(true);
  stopCountdown();
  hideError();

  try {
    const res = await fetch(buildExcelUrl(), { cache: 'no-store' });

    if (!res.ok) throw new Error(
      'Could not load Matrix.xlsx (HTTP ' + res.status + '). ' +
      'Make sure the file is uploaded to your GitHub repository.'
    );

    const buffer = await res.arrayBuffer();
    const wb     = XLSX.read(buffer, { type: 'array' });
    const sheet  = wb.Sheets[wb.SheetNames[0]];
    const rows   = XLSX.utils.sheet_to_json(sheet);

    if (rows.length === 0) throw new Error(
      'Excel file is empty or has no data rows. ' +
      'Make sure row 1 has column headers and data starts from row 2.'
    );

    allData = normalise(rows);
    lastFetchTime = new Date();
    setSyncState('ok', 'Updated ' + timeAgo(lastFetchTime));
    buildFloorPills(); updateStats(); render();
    showToast('✓ ' + allData.length + ' units loaded');
    startCountdown();

  } catch(err) {
    setSyncState('error', 'Fetch failed');
    showSkeleton(false);
    showError('Could not load Excel file', err.message);
    startCountdown();
  }

  btn.disabled = false;
  btn.classList.remove('spinning');
}

function normalise(raw) {
  const C = CONFIG.COLUMNS;
  return raw.map(r => {
    const rawStatus = String(r[C.status] ?? r['Status'] ?? r['status'] ?? 'Unknown').trim();
    const status    = rawStatus.charAt(0).toUpperCase() + rawStatus.slice(1).toLowerCase();
    return {
      Floor:        String(r[C.floor]  ?? r['Floor']  ?? r['floor']  ?? '?').trim(),
      Unit:         String(r[C.unit]   ?? r['Unit']   ?? r['unit']   ?? '?').trim(),
      Status:       status,
      'Sale Value': Number(r[C.value]  ?? r['Sale Value'] ?? r['SaleValue'] ?? r['sale value'] ?? 0)
    };
  });
}

/* ════════════════ Error panel ════════════════ */
function showError(title, body) {
  document.getElementById('errorTitle').textContent = title;
  document.getElementById('errorBody').innerHTML    = body;
  document.getElementById('errorPanel').classList.add('show');
  showSkeleton(false);
}
function hideError() {
  document.getElementById('errorPanel').classList.remove('show');
}


  allData = [
    {Floor:"1",Unit:"asd",    Status:"Available","Sale Value":11111},
    {Floor:"1",Unit:"zx12",   Status:"Sold",      "Sale Value":11323},
    {Floor:"1",Unit:"sf",     Status:"Sold",      "Sale Value":11111},
    {Floor:"2",Unit:"grdd",   Status:"Sold",      "Sale Value":22222},
    {Floor:"3",Unit:"12eff",  Status:"Sold",      "Sale Value":33323},
    {Floor:"2",Unit:"12dfff", Status:"Available", "Sale Value":22323},
    {Floor:"4",Unit:"ksdsd",  Status:"Available", "Sale Value":44444},
    {Floor:"5",Unit:"aaa",    Status:"Available", "Sale Value":55555},
    {Floor:"6",Unit:"ddd",    Status:"Available", "Sale Value":66666}
  ];
  lastFetchTime = new Date();
  setSyncState('stale','Demo — update CONFIG.EXCEL_URL');
  buildFloorPills(); updateStats(); render();
  showToast('ℹ Demo data — set your EXCEL_URL in CONFIG', 'info');
}

/* ════════════════ Countdown ring ════════════════ */
function startCountdown() {
  if (CONFIG.AUTO_REFRESH_MINUTES <= 0) {
    document.getElementById('countdownRing').style.display = 'none';
    return;
  }
  const totalMs  = CONFIG.AUTO_REFRESH_MINUTES * 60 * 1000;
  const startMs  = Date.now();
  const ring     = document.getElementById('ringFill');

  function tick() {
    const elapsed = Date.now() - startMs;
    const pct     = Math.min(elapsed / totalMs, 1);
    // offset goes from 0 (full) → CIRCUMF (empty) as time passes
    ring.style.strokeDashoffset = (pct * CIRCUMF).toFixed(2);
    document.getElementById('syncLabel').textContent =
      lastFetchTime ? 'Updated ' + timeAgo(lastFetchTime) : 'Live';
  }

  tick();
  countdownInt = setInterval(tick, 1000);
  refreshTimer  = setTimeout(() => { clearInterval(countdownInt); fetchData(); }, totalMs);
}

function stopCountdown() {
  if (refreshTimer)  clearTimeout(refreshTimer);
  if (countdownInt)  clearInterval(countdownInt);
  refreshTimer = countdownInt = null;
  const ring = document.getElementById('ringFill');
  if (ring) ring.style.strokeDashoffset = 0;
}

/* ════════════════ Sync indicator ════════════════ */
function setSyncState(state, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='ok' ? '' : ' '+state);
  document.getElementById('syncLabel').textContent = label;
}

function timeAgo(d) {
  const s = Math.floor((new Date()-d)/1000);
  if (s<5)  return 'just now';
  if (s<60) return s+'s ago';
  return Math.floor(s/60)+'m ago';
}

/* ════════════════ Skeleton ════════════════ */
function showSkeleton(on) {
  document.getElementById('skeletonLoader').style.display = on ? 'grid' : 'none';
  document.getElementById('gridView').style.display  = 'none';
  document.getElementById('tableView').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
}

/* ════════════════ Floor pills ════════════════ */
function buildFloorPills() {
  const floors = ['all', ...new Set(allData.map(d=>d.Floor).sort((a,b)=>+a-+b))];
  document.getElementById('floorPills').innerHTML = floors.map(f=>`
    <button class="floor-pill ${f===activeFloor?'active':''}" onclick="setFloor('${f}',this)">
      ${f==='all'?'All':'F'+f}
    </button>`).join('');
}

/* ════════════════ Filters ════════════════ */
function setStatus(val,btn) {
  activeStatus = val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  btn.className='filter-btn '+(val==='all'?'active-all':val==='Available'?'active-available':'active-sold');
  render();
}
function setFloor(val,btn) {
  activeFloor=val;
  document.querySelectorAll('.floor-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setView(val,btn) {
  currentView=val;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ════════════════ Stats ════════════════ */
function updateStats() {
  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statAvail').textContent = allData.filter(d=>d.Status==='Available').length;
  document.getElementById('statSold').textContent  = allData.filter(d=>d.Status==='Sold').length;
}

function getFiltered() {
  return allData.filter(d=>
    (activeStatus==='all'||d.Status===activeStatus) &&
    (activeFloor==='all' ||String(d.Floor)===String(activeFloor))
  );
}

function fmt(n){ return n?'AED '+Number(n).toLocaleString('en-US'):'—'; }

/* ════════════════ Render ════════════════ */
function render() {
  showSkeleton(false);
  const data=getFiltered(), empty=!data.length;
  document.getElementById('countDisplay').textContent = data.length;
  document.getElementById('emptyState').style.display  = empty?'block':'none';
  document.getElementById('gridView').style.display    = (!empty&&currentView==='grid') ?'grid':'none';
  document.getElementById('tableView').style.display   = (!empty&&currentView==='table')?'block':'none';
  if(empty) return;
  currentView==='grid'?renderGrid(data):renderTable(data);
}

function renderGrid(data) {
  document.getElementById('gridView').innerHTML = data.map((u,i)=>{
    const c=u.Status==='Available'?'available':'sold';
    return `<div class="unit-card ${c}" style="animation-delay:${i*.045}s">
      <div class="card-strip"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="unit-id">${u.Unit}</div>
          <div class="status-badge">${u.Status}</div>
        </div>
        <div class="card-floor">Floor ${u.Floor}</div>
        <div class="card-sep"></div>
        <div class="card-price-label">Sale Value</div>
        <div class="card-price">${fmt(u['Sale Value'])}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTable(data) {
  document.getElementById('tableBody').innerHTML = data.map((u,i)=>{
    const c=u.Status==='Available'?'available':'sold';
    return `<tr class="row-${c}" style="animation-delay:${i*.03}s">
      <td class="table-unit">${u.Unit}</td>
      <td class="table-floor">Floor ${u.Floor}</td>
      <td><span class="table-badge ${c}">${u.Status}</span></td>
      <td class="table-value">${fmt(u['Sale Value'])}</td>
    </tr>`;
  }).join('');
}

/* ════════════════ Toast ════════════════ */
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast'+(type?' '+type:''),3500);
}

/* ════════════════ Boot ════════════════ */
fetchData();
</script>
</body>
</html>
